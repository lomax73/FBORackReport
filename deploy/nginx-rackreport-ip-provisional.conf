# Config REALMENTE in uso in produzione finché non esiste un dominio:
# MKRemote è su 94.177.161.127:443, il Portale su :8443, Collaudi Fibra
# su :8444, FBOPreventivi su :8445 (tutti self-signed), questa app usa
# la porta 8446 sullo stesso IP.
# Da sostituire con nginx-rackreport.conf (dominio + Let's Encrypt) appena
# disponibile un dominio reale — vedi deploy/README.md.
server {
    listen 8446 ssl;
    server_name 94.177.161.127;

    ssl_certificate     /etc/ssl/rackreport/selfsigned.crt;
    ssl_certificate_key /etc/ssl/rackreport/selfsigned.key;

    client_max_body_size 20M;

    location /api/internal/ {
        allow 127.0.0.1;
        deny all;
        proxy_pass http://unix:/run/rackreport/gunicorn.sock;
        proxy_set_header Host $http_host;
        proxy_set_header X-Forwarded-Proto https;
    }

    location /static/ {
        alias /opt/rackreport/app/staticfiles/;
    }

    location /media/ {
        alias /opt/rackreport/app/media/;
    }

    location / {
        proxy_pass http://unix:/run/rackreport/gunicorn.sock;
        proxy_set_header Host $http_host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto https;
    }
}
