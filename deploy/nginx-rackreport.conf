server {
    listen 80;
    server_name rackreport.tuodominio.it;

    client_max_body_size 20M;

    location /api/internal/ {
        allow 127.0.0.1;
        deny all;
        proxy_pass http://unix:/run/rackreport/gunicorn.sock;
        proxy_set_header Host $http_host;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location /static/ {
        alias /opt/rackreport/app/staticfiles/;
    }

    location /media/ {
        alias /opt/rackreport/app/media/;
    }

    location / {
        proxy_pass http://unix:/run/rackreport/gunicorn.sock;
        # $http_host (non $host): include la porta se non standard, altrimenti
        # il controllo CSRF di Django fallisce per mismatch Host/Referer.
        proxy_set_header Host $http_host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}
