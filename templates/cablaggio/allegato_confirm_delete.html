{% extends "base.html" %}

{% block title %}Elimina allegato — Portale FBO{% endblock %}

{% block content %}
<h1>Elimina allegato</h1>
<div class="card">
    <p>Eliminare l'allegato <strong>{{ object.nome_originale }}</strong>? L'operazione è definitiva.</p>
    <form method="post">
        {% csrf_token %}
        <button class="btn" style="background:#ef4444;" type="submit">Elimina</button>
        <a class="btn btn-secondary" href="{% url 'progetto-detail' object.rack.progetto_id %}">Annulla</a>
    </form>
</div>
{% endblock %}
